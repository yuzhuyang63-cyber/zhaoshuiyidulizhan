limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/zhaoshuiyidulizhan;
    index index.html;

    # ---- gzip compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/html text/css application/javascript application/json image/svg+xml;

    # ---- security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- static assets: browser caching ----
    location ~* \.(jpg|jpeg|png|webp|svg|css|js|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(mp4)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Inquiry exports and raw lead data must never be served as static files.
    location ^~ /data/ {
        deny all;
        return 404;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        access_log off;
    }

    location /api/ {
        limit_req zone=api_per_ip burst=20 nodelay;
        limit_conn addr 20;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
